<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Platform Adventure</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Arial', sans-serif;
      overflow: hidden;
      background: #87CEEB;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      border: 2px solid #333;
      background: #87CEEB;
      display: block;
    }

    /* HUD Container */
    #hud {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    /* Health Display */
    #health-display {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .heart {
      width: 32px;
      height: 32px;
      background: #ff0000;
      position: relative;
      transform: rotate(-45deg);
      animation: heartbeat 1.5s ease-in-out infinite;
    }

    .heart::before,
    .heart::after {
      content: '';
      width: 32px;
      height: 32px;
      background: #ff0000;
      border-radius: 50%;
      position: absolute;
    }

    .heart::before {
      top: -16px;
      left: 0;
    }

    .heart::after {
      left: 16px;
      top: 0;
    }

    .heart.empty {
      background: #666;
    }

    .heart.empty::before,
    .heart.empty::after {
      background: #666;
    }

    @keyframes heartbeat {
      0%, 100% { transform: rotate(-45deg) scale(1); }
      50% { transform: rotate(-45deg) scale(1.1); }
    }

    /* Coin Display */
    #coin-display {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 215, 0, 0.9);
      padding: 8px 16px;
      border-radius: 20px;
      border: 3px solid #DAA520;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    .coin-icon {
      width: 28px;
      height: 28px;
      background: radial-gradient(circle, #FFD700 0%, #FFA500 100%);
      border-radius: 50%;
      border: 2px solid #DAA520;
      position: relative;
      animation: coin-spin 2s linear infinite;
    }

    .coin-icon::before {
      content: '$';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #8B4513;
      font-weight: bold;
      font-size: 18px;
    }

    @keyframes coin-spin {
      0%, 100% { transform: rotateY(0deg); }
      50% { transform: rotateY(180deg); }
    }

    #coin-count {
      font-size: 24px;
      font-weight: bold;
      color: #8B4513;
      text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
    }

    /* Game Over / Victory Modal */
    #game-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 200;
      animation: fadeIn 0.3s ease-in;
    }

    #game-modal.show {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 40px 60px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      animation: slideDown 0.5s ease-out;
    }

    @keyframes slideDown {
      from { transform: translateY(-100px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-content.victory {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }

    .modal-content h2 {
      font-size: 48px;
      color: #fff;
      margin-bottom: 20px;
      text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
    }

    .modal-content p {
      font-size: 24px;
      color: #f0f0f0;
      margin-bottom: 30px;
    }

    #restart-btn {
      background: #fff;
      color: #667eea;
      border: none;
      padding: 15px 40px;
      font-size: 20px;
      font-weight: bold;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    #restart-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }

    #restart-btn:active {
      transform: scale(0.95);
    }

    /* Visual Feedback Effects */
    .damage-flash {
      animation: damageFlash 0.5s ease-out;
    }

    @keyframes damageFlash {
      0%, 100% { filter: brightness(1); }
      25%, 75% { filter: brightness(2) saturate(0); }
      50% { filter: brightness(3) saturate(0); }
    }

    /* Particle Effect Container */
    #particle-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 50;
    }

    .particle {
      position: absolute;
      width: 8px;
      height: 8px;
      background: #FFD700;
      border-radius: 50%;
      pointer-events: none;
      animation: particleFly 1s ease-out forwards;
    }

    @keyframes particleFly {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(var(--tx), var(--ty)) scale(0);
        opacity: 0;
      }
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      #hud {
        top: 10px;
        left: 10px;
        gap: 10px;
      }

      .heart {
        width: 24px;
        height: 24px;
      }

      .heart::before,
      .heart::after {
        width: 24px;
        height: 24px;
      }

      .heart::before {
        top: -12px;
      }

      .heart::after {
        left: 12px;
      }

      #coin-display {
        padding: 6px 12px;
      }

      .coin-icon {
        width: 20px;
        height: 20px;
      }

      #coin-count {
        font-size: 18px;
      }

      .modal-content {
        padding: 30px 40px;
      }

      .modal-content h2 {
        font-size: 36px;
      }

      .modal-content p {
        font-size: 18px;
      }

      #restart-btn {
        padding: 12px 30px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    
    <!-- HUD Display -->
    <div id="hud">
      <div id="health-display">
        <!-- Hearts will be generated by JS -->
      </div>
      <div id="coin-display">
        <div class="coin-icon"></div>
        <span id="coin-count">0</span>
      </div>
    </div>

    <!-- Particle Container -->
    <div id="particle-container"></div>

    <!-- Game Over / Victory Modal -->
    <div id="game-modal">
      <div class="modal-content">
        <h2 id="modal-title">Game Over</h2>
        <p id="modal-message">Try again!</p>
        <button id="restart-btn">Restart Game</button>
      </div>
    </div>
  </div>

  <script>
    // Game Configuration
    const CONFIG = {
      canvas: {
        width: 800,
        height: 600
      },
      player: {
        width: 32,
        height: 48,
        speed: 5,
        jumpForce: 12,
        gravity: 0.6,
        maxHealth: 3,
        invincibilityDuration: 1000 // ms
      },
      coin: {
        width: 24,
        height: 24,
        collectRadius: 30
      },
      enemy: {
        width: 32,
        height: 32,
        speed: 2
      }
    };

    // Game State
    const gameState = {
      player: {
        x: 100,
        y: 400,
        vx: 0,
        vy: 0,
        health: CONFIG.player.maxHealth,
        coins: 0,
        isJumping: false,
        isInvincible: false,
        lastDamageTime: 0
      },
      keys: {},
      isGameOver: false,
      isVictory: false,
      coins: [],
      enemies: [],
      platforms: []
    };

    // Canvas Setup
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = CONFIG.canvas.width;
    canvas.height = CONFIG.canvas.height;

    // DOM Elements
    const healthDisplay = document.getElementById('health-display');
    const coinCountDisplay = document.getElementById('coin-count');
    const gameModal = document.getElementById('game-modal');
    const modalTitle = document.getElementById('modal-title');
    const modalMessage = document.getElementById('modal-message');
    const restartBtn = document.getElementById('restart-btn');
    const particleContainer = document.getElementById('particle-container');

    // Initialize HUD
    function initHUD() {
      updateHealthDisplay();
      updateCoinDisplay();
    }

    function updateHealthDisplay() {
      healthDisplay.innerHTML = '';
      for (let i = 0; i < CONFIG.player.maxHealth; i++) {
        const heart = document.createElement('div');
        heart.className = i < gameState.player.health ? 'heart' : 'heart empty';
        healthDisplay.appendChild(heart);
      }
    }

    function updateCoinDisplay() {
      coinCountDisplay.textContent = gameState.player.coins;
    }

    // Visual Feedback: Damage Flash
    function triggerDamageFlash() {
      canvas.classList.add('damage-flash');
      setTimeout(() => {
        canvas.classList.remove('damage-flash');
      }, 500);
    }

    // Visual Feedback: Coin Collection Particles
    function createCollectionParticles(x, y) {
      const particleCount = 8;
      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        
        const angle = (Math.PI * 2 * i) / particleCount;
        const distance = 50 + Math.random() * 30;
        const tx = Math.cos(angle) * distance;
        const ty = Math.sin(angle) * distance;
        
        particle.style.left = x + 'px';
        particle.style.top = y + 'px';
        particle.style.setProperty('--tx', tx + 'px');
        particle.style.setProperty('--ty', ty + 'px');
        
        particleContainer.appendChild(particle);
        
        setTimeout(() => {
          particle.remove();
        }, 1000);
      }
    }

    // Game Over / Victory Modal
    function showGameModal(isVictory) {
      const modalContent = gameModal.querySelector('.modal-content');
      
      if (isVictory) {
        modalContent.classList.add('victory');
        modalTitle.textContent = '🎉 Victory! 🎉';
        modalMessage.textContent = `You collected ${gameState.player.coins} coins!`;
      } else {
        modalContent.classList.remove('victory');
        modalTitle.textContent = '💀 Game Over 💀';
        modalMessage.textContent = 'Better luck next time!';
      }
      
      gameModal.classList.add('show');
    }

    function hideGameModal() {
      gameModal.classList.remove('show');
    }

    // Game Initialization
    function initGame() {
      // Reset game state
      gameState.player.x = 100;
      gameState.player.y = 400;
      gameState.player.vx = 0;
      gameState.player.vy = 0;
      gameState.player.health = CONFIG.player.maxHealth;
      gameState.player.coins = 0;
      gameState.player.isJumping = false;
      gameState.player.isInvincible = false;
      gameState.isGameOver = false;
      gameState.isVictory = false;

      // Create platforms
      gameState.platforms = [
        { x: 0, y: 550, width: 800, height: 50 },
        { x: 200, y: 450, width: 150, height: 20 },
        { x: 450, y: 350, width: 150, height: 20 },
        { x: 100, y: 250, width: 150, height: 20 },
        { x: 600, y: 200, width: 150, height: 20 }
      ];

      // Create coins
      gameState.coins = [
        { x: 250, y: 400, collected: false },
        { x: 500, y: 300, collected: false },
        { x: 150, y: 200, collected: false },
        { x: 650, y: 150, collected: false },
        { x: 400, y: 500, collected: false }
      ];

      // Create enemies
      gameState.enemies = [
        { x: 300, y: 430, vx: CONFIG.enemy.speed, minX: 200, maxX: 350 },
        { x: 500, y: 330, vx: -CONFIG.enemy.speed, minX: 450, maxX: 600 }
      ];

      initHUD();
      hideGameModal();
    }

    // Input Handling
    window.addEventListener('keydown', (e) => {
      gameState.keys[e.key] = true;
      
      if (e.key === ' ' && !gameState.player.isJumping && !gameState.isGameOver) {
        gameState.player.vy = -CONFIG.player.jumpForce;
        gameState.player.isJumping = true;
      }
    });

    window.addEventListener('keyup', (e) => {
      gameState.keys[e.key] = false;
    });

    restartBtn.addEventListener('click', () => {
      initGame();
    });

    // Collision Detection
    function checkCollision(rect1, rect2) {
      return rect1.x < rect2.x + rect2.width &&
             rect1.x + rect1.width > rect2.x &&
             rect1.y < rect2.y + rect2.height &&
             rect1.y + rect1.height > rect2.y;
    }

    function checkCircleCollision(x1, y1, x2, y2, radius) {
      const dx = x1 - x2;
      const dy = y1 - y2;
      return Math.sqrt(dx * dx + dy * dy) < radius;
    }

    // Player Damage
    function damagePlayer() {
      if (gameState.player.isInvincible) return;
      
      gameState.player.health--;
      gameState.player.isInvincible = true;
      gameState.player.lastDamageTime = Date.now();
      
      updateHealthDisplay();
      triggerDamageFlash();
      
      setTimeout(() => {
        gameState.player.isInvincible = false;
      }, CONFIG.player.invincibilityDuration);
      
      if (gameState.player.health <= 0) {
        gameState.isGameOver = true;
        showGameModal(false);
      }
    }

    // Game Update Loop
    function update() {
      if (gameState.isGameOver) return;

      const player = gameState.player;

      // Horizontal movement
      if (gameState.keys['ArrowLeft'] || gameState.keys['a']) {
        player.vx = -CONFIG.player.speed;
      } else if (gameState.keys['ArrowRight'] || gameState.keys['d']) {
        player.vx = CONFIG.player.speed;
      } else {
        player.vx = 0;
      }

      // Apply gravity
      player.vy += CONFIG.player.gravity;

      // Update position
      player.x += player.vx;
      player.y += player.vy;

      // Platform collision
      player.isJumping = true;
      gameState.platforms.forEach(platform => {
        if (checkCollision(
          { x: player.x, y: player.y, width: CONFIG.player.width, height: CONFIG.player.height },
          platform
        )) {
          if (player.vy > 0 && player.y + CONFIG.player.height - player.vy <= platform.y) {
            player.y = platform.y - CONFIG.player.height;
            player.vy = 0;
            player.isJumping = false;
          }
        }
      });

      // Boundary check
      if (player.x < 0) player.x = 0;
      if (player.x + CONFIG.player.width > CONFIG.canvas.width) {
        player.x = CONFIG.canvas.width - CONFIG.player.width;
      }
      if (player.y > CONFIG.canvas.height) {
        damagePlayer();
        player.y = 400;
        player.vy = 0;
      }

      // Coin collection
      gameState.coins.forEach(coin => {
        if (!coin.collected) {
          const coinCenterX = coin.x + CONFIG.coin.width / 2;
          const coinCenterY = coin.y + CONFIG.coin.height / 2;
          const playerCenterX = player.x + CONFIG.player.width / 2;
          const playerCenterY = player.y + CONFIG.player.height / 2;
          
          if (checkCircleCollision(
            playerCenterX, playerCenterY,
            coinCenterX, coinCenterY,
            CONFIG.coin.collectRadius
          )) {
            coin.collected = true;
            player.coins++;
            updateCoinDisplay();
            
            // Create particles at coin position
            const rect = canvas.getBoundingClientRect();
            createCollectionParticles(
              rect.left + coinCenterX,
              rect.top + coinCenterY
            );
            
            // Check victory condition
            if (player.coins >= gameState.coins.length) {
              gameState.isVictory = true;
              gameState.isGameOver = true;
              setTimeout(() => showGameModal(true), 500);
            }
          }
        }
      });

      // Enemy movement and collision
      gameState.enemies.forEach(enemy => {
        enemy.x += enemy.vx;
        
        if (enemy.x <= enemy.minX || enemy.x >= enemy.maxX) {
          enemy.vx *= -1;
        }
        
        if (checkCollision(
          { x: player.x, y: player.y, width: CONFIG.player.width, height: CONFIG.player.height },
          { x: enemy.x, y: enemy.y, width: CONFIG.enemy.width, height: CONFIG.enemy.height }
        )) {
          damagePlayer();
        }
      });
    }

    // Render Loop
    function render() {
      ctx.clearRect(0, 0, CONFIG.canvas.width, CONFIG.canvas.height);

      // Draw platforms
      ctx.fillStyle = '#8B4513';
      gameState.platforms.forEach(platform => {
        ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
        ctx.strokeStyle = '#654321';
        ctx.lineWidth = 2;
        ctx.strokeRect(platform.x, platform.y, platform.width, platform.height);
      });

      // Draw coins
      gameState.coins.forEach(coin => {
        if (!coin.collected) {
          ctx.fillStyle = '#FFD700';
          ctx.beginPath();
          ctx.arc(coin.x + CONFIG.coin.width / 2, coin.y + CONFIG.coin.height / 2, CONFIG.coin.width / 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = '#DAA520';
          ctx.lineWidth = 2;
          ctx.stroke();
          
          ctx.fillStyle = '#8B4513';
          ctx.font = 'bold 16px Arial';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('$', coin.x + CONFIG.coin.width / 2, coin.y + CONFIG.coin.height / 2);
        }
      });

      // Draw enemies
      ctx.fillStyle = '#8B0000';
      gameState.enemies.forEach(enemy => {
        ctx.fillRect(enemy.x, enemy.y, CONFIG.enemy.width, CONFIG.enemy.height);
        ctx.strokeStyle = '#4B0000';
        ctx.lineWidth = 2;
        ctx.strokeRect(enemy.x, enemy.y, CONFIG.enemy.width, CONFIG.enemy.height);
        
        // Draw enemy eyes
        ctx.fillStyle = '#fff';
        ctx.fillRect(enemy.x + 8, enemy.y + 10, 6, 6);
        ctx.fillRect(enemy.x + 18, enemy.y + 10, 6, 6);
      });

      // Draw player with invincibility flicker
      const shouldDraw = !gameState.player.isInvincible || Math.floor(Date.now() / 100) % 2 === 0;
      if (shouldDraw) {
        ctx.fillStyle = '#4169E1';
        ctx.fillRect(gameState.player.x, gameState.player.y, CONFIG.player.width, CONFIG.player.height);
        ctx.strokeStyle = '#1E3A8A';
        ctx.lineWidth = 2;
        ctx.strokeRect(gameState.player.x, gameState.player.y, CONFIG.player.width, CONFIG.player.height);
        
        // Draw player face
        ctx.fillStyle = '#fff';
        ctx.fillRect(gameState.player.x + 8, gameState.player.y + 12, 6, 6);
        ctx.fillRect(gameState.player.x + 18, gameState.player.y + 12, 6, 6);
      }
    }

    // Game Loop
    function gameLoop() {
      update();
      render();
      requestAnimationFrame(gameLoop);
    }

    // Start Game
    initGame();
    gameLoop();
  </script>
</body>
</html>
