<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tower Defense Game</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary-color: #1a1a2e;
      --secondary-color: #16213e;
      --accent-color: #0f3460;
      --highlight-color: #e94560;
      --text-color: #f1f1f1;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: var(--text-color);
    }

    #game-container {
      position: relative;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      border-radius: 8px;
      overflow: hidden;
    }

    #game-canvas {
      display: block;
      background: #2a2a3e;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
    }

    #game-ui {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      pointer-events: none;
    }

    .ui-panel {
      background: rgba(26, 26, 46, 0.85);
      padding: 10px 15px;
      border-radius: 6px;
      backdrop-filter: blur(5px);
      margin-bottom: 10px;
      pointer-events: auto;
    }

    .game-stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      font-weight: bold;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stat-label {
      color: #888;
    }

    .stat-value {
      color: var(--highlight-color);
      font-size: 16px;
    }

    #game-state-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 20px;
    }

    #game-state-overlay.active {
      display: flex;
    }

    .state-message {
      font-size: 48px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 4px;
    }

    .state-message.victory {
      color: #4ecca3;
    }

    .state-message.defeat {
      color: var(--highlight-color);
    }

    .state-button {
      padding: 12px 30px;
      font-size: 18px;
      font-weight: bold;
      background: var(--highlight-color);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
      pointer-events: auto;
    }

    .state-button:hover {
      background: #ff6b81;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
    }

    #loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--primary-color);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 20px;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--highlight-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 18px;
      color: #888;
    }

    .loading-progress {
      width: 200px;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .loading-bar {
      height: 100%;
      background: var(--highlight-color);
      width: 0%;
      transition: width 0.3s ease;
    }

    @media (max-width: 768px) {
      #game-canvas {
        max-width: 100vw;
        height: auto;
      }

      .game-stats {
        font-size: 12px;
      }

      .state-message {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas" width="800" height="600"></canvas>
    
    <div id="game-ui">
      <div class="ui-panel game-stats">
        <div class="stat-item">
          <span class="stat-label">Health:</span>
          <span class="stat-value" id="stat-health">100</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Gold:</span>
          <span class="stat-value" id="stat-gold">500</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Wave:</span>
          <span class="stat-value" id="stat-wave">1</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">FPS:</span>
          <span class="stat-value" id="stat-fps">60</span>
        </div>
      </div>
    </div>

    <div id="game-state-overlay">
      <div class="state-message" id="state-message">Game Over</div>
      <button class="state-button" id="restart-button">Restart Game</button>
    </div>

    <div id="loading-screen">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading Assets...</div>
      <div class="loading-progress">
        <div class="loading-bar" id="loading-bar"></div>
      </div>
    </div>
  </div>

  <script type="module">
    // ============================================================================
    // Core/AssetLoader - Resource loading and management
    // ============================================================================
    class AssetLoader {
      constructor() {
        this.assets = new Map();
        this.loadQueue = [];
        this.loadedCount = 0;
        this.totalCount = 0;
        this.onProgressCallback = null;
      }

      /**
       * Add asset to load queue
       * @param {string} key - Unique identifier for asset
       * @param {string} url - Asset URL
       * @param {string} type - Asset type: 'image' | 'audio' | 'json'
       */
      addAsset(key, url, type = 'image') {
        this.loadQueue.push({ key, url, type });
        this.totalCount++;
      }

      /**
       * Load all queued assets
       * @returns {Promise<void>}
       */
      async loadAll() {
        const promises = this.loadQueue.map(asset => this._loadAsset(asset));
        await Promise.all(promises);
        this.loadQueue = [];
      }

      /**
       * Load single asset
       * @private
       */
      async _loadAsset({ key, url, type }) {
        try {
          let asset;
          
          switch (type) {
            case 'image':
              asset = await this._loadImage(url);
              break;
            case 'audio':
              asset = await this._loadAudio(url);
              break;
            case 'json':
              asset = await this._loadJSON(url);
              break;
            default:
              throw new Error(`Unknown asset type: ${type}`);
          }

          this.assets.set(key, asset);
          this.loadedCount++;
          
          if (this.onProgressCallback) {
            this.onProgressCallback(this.loadedCount / this.totalCount);
          }
        } catch (error) {
          console.error(`Failed to load asset: ${key} from ${url}`, error);
          throw error;
        }
      }

      _loadImage(url) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = url;
        });
      }

      _loadAudio(url) {
        return new Promise((resolve, reject) => {
          const audio = new Audio();
          audio.oncanplaythrough = () => resolve(audio);
          audio.onerror = reject;
          audio.src = url;
        });
      }

      async _loadJSON(url) {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        return await response.json();
      }

      /**
       * Get loaded asset by key
       * @param {string} key
       * @returns {any}
       */
      getAsset(key) {
        return this.assets.get(key);
      }

      /**
       * Check if asset exists
       * @param {string} key
       * @returns {boolean}
       */
      hasAsset(key) {
        return this.assets.has(key);
      }

      /**
       * Set progress callback
       * @param {Function} callback - (progress: number) => void
       */
      onProgress(callback) {
        this.onProgressCallback = callback;
      }

      /**
       * Get loading progress (0-1)
       * @returns {number}
       */
      getProgress() {
        return this.totalCount === 0 ? 1 : this.loadedCount / this.totalCount;
      }
    }

    // ============================================================================
    // Core/Renderer - Canvas rendering pipeline
    // ============================================================================
    class Camera {
      constructor(x = 0, y = 0) {
        this.x = x;
        this.y = y;
        this.zoom = 1;
      }

      /**
       * Convert world coordinates to screen coordinates
       */
      worldToScreen(worldX, worldY) {
        return {
          x: (worldX - this.x) * this.zoom,
          y: (worldY - this.y) * this.zoom
        };
      }

      /**
       * Convert screen coordinates to world coordinates
       */
      screenToWorld(screenX, screenY) {
        return {
          x: screenX / this.zoom + this.x,
          y: screenY / this.zoom + this.y
        };
      }
    }

    class Renderer {
      constructor() {
        this.canvas = null;
        this.ctx = null;
        this.camera = new Camera();
        this.width = 0;
        this.height = 0;
      }

      /**
       * Initialize renderer with canvas element
       * @param {string} canvasId - Canvas element ID
       * @returns {boolean} Success status
       */
      initialize(canvasId) {
        this.canvas = document.getElementById(canvasId);
        if (!this.canvas) {
          console.error(`Canvas element not found: ${canvasId}`);
          return false;
        }

        this.ctx = this.canvas.getContext('2d');
        if (!this.ctx) {
          console.error('Failed to get 2D context');
          return false;
        }

        this.width = this.canvas.width;
        this.height = this.canvas.height;

        // Set default rendering properties
        this.ctx.imageSmoothingEnabled = false;
        
        return true;
      }

      /**
       * Clear entire canvas
       */
      clear() {
        this.ctx.clearRect(0, 0, this.width, this.height);
      }

      /**
       * Fill canvas with color
       * @param {string} color
       */
      fillBackground(color) {
        this.ctx.fillStyle = color;
        this.ctx.fillRect(0, 0, this.width, this.height);
      }

      /**
       * Draw sprite/image
       * @param {HTMLImageElement} image
       * @param {number} x - World X coordinate
       * @param {number} y - World Y coordinate
       * @param {number} width
       * @param {number} height
       * @param {number} [sourceX] - Source sprite X
       * @param {number} [sourceY] - Source sprite Y
       * @param {number} [sourceWidth] - Source sprite width
       * @param {number} [sourceHeight] - Source sprite height
       */
      drawSprite(image, x, y, width, height, sourceX, sourceY, sourceWidth, sourceHeight) {
        const screenPos = this.camera.worldToScreen(x, y);
        const scaledWidth = width * this.camera.zoom;
        const scaledHeight = height * this.camera.zoom;

        if (sourceX !== undefined && sourceY !== undefined && sourceWidth !== undefined && sourceHeight !== undefined) {
          this.ctx.drawImage(
            image,
            sourceX, sourceY, sourceWidth, sourceHeight,
            screenPos.x, screenPos.y, scaledWidth, scaledHeight
          );
        } else {
          this.ctx.drawImage(image, screenPos.x, screenPos.y, scaledWidth, scaledHeight);
        }
      }

      /**
       * Draw text
       * @param {string} text
       * @param {number} x
       * @param {number} y
       * @param {Object} style - {font, color, align, baseline}
       */
      drawText(text, x, y, style = {}) {
        const {
          font = '16px Arial',
          color = '#ffffff',
          align = 'left',
          baseline = 'top'
        } = style;

        this.ctx.font = font;
        this.ctx.fillStyle = color;
        this.ctx.textAlign = align;
        this.ctx.textBaseline = baseline;
        this.ctx.fillText(text, x, y);
      }

      /**
       * Draw rectangle
       * @param {number} x
       * @param {number} y
       * @param {number} width
       * @param {number} height
       * @param {string} color
       * @param {boolean} filled
       */
      drawRect(x, y, width, height, color, filled = true) {
        const screenPos = this.camera.worldToScreen(x, y);
        const scaledWidth = width * this.camera.zoom;
        const scaledHeight = height * this.camera.zoom;

        if (filled) {
          this.ctx.fillStyle = color;
          this.ctx.fillRect(screenPos.x, screenPos.y, scaledWidth, scaledHeight);
        } else {
          this.ctx.strokeStyle = color;
          this.ctx.strokeRect(screenPos.x, screenPos.y, scaledWidth, scaledHeight);
        }
      }

      /**
       * Draw circle
       * @param {number} x
       * @param {number} y
       * @param {number} radius
       * @param {string} color
       * @param {boolean} filled
       */
      drawCircle(x, y, radius, color, filled = true) {
        const screenPos = this.camera.worldToScreen(x, y);
        const scaledRadius = radius * this.camera.zoom;

        this.ctx.beginPath();
        this.ctx.arc(screenPos.x, screenPos.y, scaledRadius, 0, Math.PI * 2);
        
        if (filled) {
          this.ctx.fillStyle = color;
          this.ctx.fill();
        } else {
          this.ctx.strokeStyle = color;
          this.ctx.stroke();
        }
      }

      /**
       * Get canvas context
       * @returns {CanvasRenderingContext2D}
       */
      getContext() {
        return this.ctx;
      }

      /**
       * Get camera instance
       * @returns {Camera}
       */
      getCamera() {
        return this.camera;
      }
    }

    // ============================================================================
    // Core/StateManager - Game state management
    // ============================================================================
    const GameState = {
      LOADING: 'loading',
      PLAYING: 'playing',
      PAUSED: 'paused',
      VICTORY: 'victory',
      DEFEAT: 'defeat'
    };

    class StateManager {
      constructor() {
        this.currentState = GameState.LOADING;
        this.previousState = null;
        this.stateChangeCallbacks = new Map();
      }

      /**
       * Change game state
       * @param {string} newState
       */
      setState(newState) {
        if (this.currentState === newState) return;

        this.previousState = this.currentState;
        this.currentState = newState;

        console.log(`State changed: ${this.previousState} -> ${this.currentState}`);

        // Trigger callbacks for this state
        const callbacks = this.stateChangeCallbacks.get(newState);
        if (callbacks) {
          callbacks.forEach(callback => callback(this.previousState));
        }
      }

      /**
       * Get current state
       * @returns {string}
       */
      getState() {
        return this.currentState;
      }

      /**
       * Check if in specific state
       * @param {string} state
       * @returns {boolean}
       */
      isState(state) {
        return this.currentState === state;
      }

      /**
       * Register callback for state change
       * @param {string} state
       * @param {Function} callback
       */
      onStateChange(state, callback) {
        if (!this.stateChangeCallbacks.has(state)) {
          this.stateChangeCallbacks.set(state, []);
        }
        this.stateChangeCallbacks.get(state).push(callback);
      }

      /**
       * Check if game is running
       * @returns {boolean}
       */
      isPlaying() {
        return this.currentState === GameState.PLAYING;
      }

      /**
       * Check if game is over
       * @returns {boolean}
       */
      isGameOver() {
        return this.currentState === GameState.VICTORY || this.currentState === GameState.DEFEAT;
      }
    }

    // ============================================================================
    // Core/GameEngine - Main game loop and orchestration
    // ============================================================================
    class GameEngine {
      constructor() {
        this.renderer = new Renderer();
        this.assetLoader = new AssetLoader();
        this.stateManager = new StateManager();
        
        this.isRunning = false;
        this.lastFrameTime = 0;
        this.deltaTime = 0;
        this.fps = 60;
        this.frameCount = 0;
        this.fpsUpdateTime = 0;
        
        this.updateCallbacks = [];
        this.renderCallbacks = [];
      }

      /**
       * Initialize game engine
       * @param {string} canvasId
       * @returns {Promise<boolean>}
       */
      async initialize(canvasId) {
        console.log('Initializing game engine...');

        // Initialize renderer
        if (!this.renderer.initialize(canvasId)) {
          console.error('Failed to initialize renderer');
          return false;
        }

        // Setup state change handlers
        this._setupStateHandlers();

        // Load placeholder assets (for demo)
        this._loadDemoAssets();

        // Load all assets
        try {
          await this.assetLoader.loadAll();
          console.log('All assets loaded successfully');
        } catch (error) {
          console.error('Failed to load assets:', error);
          return false;
        }

        return true;
      }

      /**
       * Load demo assets for testing
       * @private
       */
      _loadDemoAssets() {
        // In real implementation, add actual asset URLs
        // For now, just simulate loading time
        this.assetLoader.onProgress((progress) => {
          const loadingBar = document.getElementById('loading-bar');
          if (loadingBar) {
            loadingBar.style.width = `${progress * 100}%`;
          }
        });
      }

      /**
       * Setup state change handlers
       * @private
       */
      _setupStateHandlers() {
        this.stateManager.onStateChange(GameState.PLAYING, () => {
          document.getElementById('loading-screen').style.display = 'none';
          document.getElementById('game-state-overlay').classList.remove('active');
        });

        this.stateManager.onStateChange(GameState.VICTORY, () => {
          const overlay = document.getElementById('game-state-overlay');
          const message = document.getElementById('state-message');
          overlay.classList.add('active');
          message.textContent = 'Victory!';
          message.className = 'state-message victory';
        });

        this.stateManager.onStateChange(GameState.DEFEAT, () => {
          const overlay = document.getElementById('game-state-overlay');
          const message = document.getElementById('state-message');
          overlay.classList.add('active');
          message.textContent = 'Defeat!';
          message.className = 'state-message defeat';
        });
      }

      /**
       * Start game loop
       */
      start() {
        if (this.isRunning) return;
        
        console.log('Starting game loop...');
        this.isRunning = true;
        this.lastFrameTime = performance.now();
        this.stateManager.setState(GameState.PLAYING);
        this._gameLoop(this.lastFrameTime);
      }

      /**
       * Stop game loop
       */
      stop() {
        console.log('Stopping game loop...');
        this.isRunning = false;
      }

      /**
       * Main game loop
       * @private
       */
      _gameLoop(currentTime) {
        if (!this.isRunning) return;

        // Calculate delta time (in seconds)
        this.deltaTime = (currentTime - this.lastFrameTime) / 1000;
        this.lastFrameTime = currentTime;

        // Update FPS counter
        this._updateFPS(currentTime);

        // Update game logic
        if (this.stateManager.isPlaying()) {
          this.update(this.deltaTime);
        }

        // Render frame
        this.render();

        // Request next frame
        requestAnimationFrame((time) => this._gameLoop(time));
      }

      /**
       * Update FPS counter
       * @private
       */
      _updateFPS(currentTime) {
        this.frameCount++;
        
        if (currentTime - this.fpsUpdateTime >= 1000) {
          this.fps = this.frameCount;
          this.frameCount = 0;
          this.fpsUpdateTime = currentTime;
          
          // Update UI
          const fpsElement = document.getElementById('stat-fps');
          if (fpsElement) {
            fpsElement.textContent = this.fps;
          }
        }
      }

      /**
       * Update all game systems
       * @param {number} deltaTime
       */
      update(deltaTime) {
        this.updateCallbacks.forEach(callback => callback(deltaTime));
      }

      /**
       * Render current frame
       */
      render() {
        // Clear canvas
        this.renderer.clear();
        this.renderer.fillBackground('#2a2a3e');

        // Render all registered callbacks
        this.renderCallbacks.forEach(callback => callback(this.renderer));

        // Demo: Draw grid
        this._renderDebugGrid();
      }

      /**
       * Render debug grid
       * @private
       */
      _renderDebugGrid() {
        const ctx = this.renderer.getContext();
        const gridSize = 50;
        
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
        ctx.lineWidth = 1;

        // Vertical lines
        for (let x = 0; x < this.renderer.width; x += gridSize) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, this.renderer.height);
          ctx.stroke();
        }

        // Horizontal lines
        for (let y = 0; y < this.renderer.height; y += gridSize) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(this.renderer.width, y);
          ctx.stroke();
        }

        // Center text
        this.renderer.drawText(
          'Tower Defense - Framework Ready',
          this.renderer.width / 2,
          this.renderer.height / 2,
          {
            font: 'bold 24px Arial',
            color: '#ffffff',
            align: 'center',
            baseline: 'middle'
          }
        );
      }

      /**
       * Register update callback
       * @param {Function} callback - (deltaTime: number) => void
       */
      onUpdate(callback) {
        this.updateCallbacks.push(callback);
      }

      /**
       * Register render callback
       * @param {Function} callback - (renderer: Renderer) => void
       */
      onRender(callback) {
        this.renderCallbacks.push(callback);
      }

      /**
       * Get renderer instance
       * @returns {Renderer}
       */
      getRenderer() {
        return this.renderer;
      }

      /**
       * Get asset loader instance
       * @returns {AssetLoader}
       */
      getAssetLoader() {
        return this.assetLoader;
      }

      /**
       * Get state manager instance
       * @returns {StateManager}
       */
      getStateManager() {
        return this.stateManager;
      }
    }

    // ============================================================================
    // Main Entry Point
    // ============================================================================
    (async function main() {
      console.log('Tower Defense Game - Initializing...');

      // Create game engine instance
      const gameEngine = new GameEngine();
      window.gameEngine = gameEngine; // Expose for debugging

      // Initialize engine
      const initialized = await gameEngine.initialize('game-canvas');
      if (!initialized) {
        console.error('Failed to initialize game engine');
        return;
      }

      // Setup restart button
      document.getElementById('restart-button').addEventListener('click', () => {
        console.log('Restarting game...');
        gameEngine.getStateManager().setState(GameState.PLAYING);
        
        // Reset demo stats
        document.getElementById('stat-health').textContent = '100';
        document.getElementById('stat-gold').textContent = '500';
        document.getElementById('stat-wave').textContent = '1';
      });

      // Demo: Register update callback
      gameEngine.onUpdate((deltaTime) => {
        // Game logic will be added here in future tasks
      });

      // Demo: Register render callback
      gameEngine.onRender((renderer) => {
        // Custom rendering will be added here in future tasks
      });

      // Demo: Test state transitions after 3 seconds
      setTimeout(() => {
        console.log('Demo: Testing victory state...');
        // Uncomment to test: gameEngine.getStateManager().setState(GameState.VICTORY);
      }, 3000);

      // Start game loop
      gameEngine.start();

      console.log('Game engine started successfully!');
    })();
  </script>
</body>
</html>
